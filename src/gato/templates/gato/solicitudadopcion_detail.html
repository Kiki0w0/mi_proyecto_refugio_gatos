{% extends 'core/base.html' %}

{% block contenido %}

<div class="container py-4">

    <h1>Detalle de Solicitud</h1>
    <div class="card p-4">
        <h3>{{ object.nombre }}</h3>

        <p><strong>Gato:</strong>
            {{ object.gato }}</p>

        <p><strong>Email:</strong>
            {{ object.email }}</p>

        <p><strong>Mensaje:</strong>
            {{ object.mensaje }}</p>

        <p><strong>Fecha:</strong>
            {{ object.fecha }}</p>
    </div>
    <a class="btn btn-secondary mt-3" href="{% url 'gato:solicitud_home' %}">
        Volver</a>
</div>

{% endblock contenido %}
