{% extends 'core/base.html' %}

{% block contenido %}
<div class="container py-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="card-title">Categorías: Eliminar</h1>
            <p class="card-text">¿Estás seguro que deseas borrar la categoría "<strong>{{ object.nombre }}</strong>"?
            </p>

            <form method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">Confirmar eliminación</button>
            </form>
            <a class="btn btn-secondary" href="{% url 'gato:categoria_home' %}">Volver</a>
        </div>
    </div>
</div>
{% endblock contenido %}
