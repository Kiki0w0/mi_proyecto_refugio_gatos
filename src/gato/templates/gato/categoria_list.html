{% extends 'core/base.html' %}

{% block contenido %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">Categorías</h1>
        <div>
            <a class="btn btn-success me-2" href="{% url 'gato:categoria_create' %}">Crear</a>
            <a class="btn btn-secondary" href="{% url 'core:home' %}">Inicio</a>
        </div>
    </div>

    <form method="get" class="row g-2 mb-4">
        <div class="col-auto flex-grow-1">
            <input type="text" name="consulta" class="form-control" placeholder="Buscar...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for categoria in object_list %}
                <tr>
                    <td>{{ categoria.id }}</td>
                    <td>{{ categoria.nombre }}</td>
                    <td>
                        <a class="btn btn-sm btn-outline-primary me-1"
                            href="{% url 'gato:categoria_detail' categoria.id %}">Detalle</a>
                        <a class="btn btn-sm btn-outline-warning me-1"
                            href="{% url 'gato:categoria_update' categoria.id %}">Editar</a>
                        <a class="btn btn-sm btn-outline-danger"
                            href="{% url 'gato:categoria_delete' categoria.id %}">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No hay categorías registradas.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock contenido %}
