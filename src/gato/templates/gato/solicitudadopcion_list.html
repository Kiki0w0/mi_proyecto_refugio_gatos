{% extends 'core/base.html' %}

{% block contenido %}

<div class="container py-4">
    <h1>Solicitudes de adopción</h1>
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Gato</th>
                <th>Nombre</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for solicitud in object_list %}
            <tr>
                <td>{{ solicitud.id }}</td>
                <td>{{ solicitud.gato }}</td>
                <td>{{ solicitud.nombre }}</td>
                <td>{{ solicitud.email }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">
                    No hay solicitudes.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock contenido %}
